<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>배수 출력</title>
</head>
<body>

<h2>배수 출력 프로그램_3</h2>

<label>숫자를 입력하세요: </label>
<input type="number" id="num">
<button onclick="printMultiples()">실행</button>

<br><br>

<div id="result"></div>

<script>
function printMultiples() {
    let n = Number(document.getElementById("num").value);

    if (!n || n <= 0) {
        alert("올바른 숫자를 입력하세요!");
        return;
    }

    let result = [];

    for (let i = n; i <= 100; i += n) {
        result.push(i);
    }

    // 쉼표로 연결해서 출력
    document.getElementById("result").innerText = result.join(", ");
}
</script>

</body>
</html>

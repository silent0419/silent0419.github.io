<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>배수 출력</title>
    <style>
        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        img {
            width: 40px; /* 이미지 크기 조절 */
        }
    </style>
</head>
<body>

<h2>배수 출력 프로그램_5</h2>

<div class="input-area">
    <label>숫자를 입력하세요: </label>
    <input type="number" id="num" onkeydown="handleKey(event)">
    <img src="/Input.png" alt="input image">
    <button onclick="printMultiples()">실행</button>
</div>

<br><br>

<div id="result"></div>

<script>
function printMultiples() {
    let n = Number(document.getElementById("num").value);

    if (!n || n <= 0) {
        alert("올바른 숫자를 입력하세요!");
        return;
    }

    let result = [];

    for (let i = n; i <= 100; i += n) {
        result.push(i);
    }

    document.getElementById("result").innerText = result.join(", ");
}

// 엔터키 처리
function handleKey(event) {
    if (event.key === "Enter") {
        printMultiples();
    }
}
</script>

</body>
</html>
